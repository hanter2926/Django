{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4">Product Inventory</h2>
    
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            {% for i in products %}
            <tr>
                <td>
                    {% if i.product_image %}
                        <img src="{{ i.product_image.url }}" width="50" height="50">
                    {% else %}
                        <img src="{% static 'images/default.png' %}" width="50">
                    {% endif %}
                </td>
                <td>{{ i.product_name }}</td>
                <td>₹{{ i.product_price }}</td>
                <td>{{ i.product_description|truncatewords:10 }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">No Products Found</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
