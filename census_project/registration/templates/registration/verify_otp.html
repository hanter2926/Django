<!DOCTYPE html>
<html>
<head>
    <title>My Page</title>
</head>
<body>

       {% if messages %}
    <div class="alert alert-warning">
        {% for message in messages %}
            {{ message }}
        {% endfor %}
    </div>
{% endif %}

<form method="post">
    {% csrf_token %}
    <input type="text" name="otp" placeholder="Enter 6-digit OTP" required>
    <button type="submit">Verify OTP</button>
</form>

</body>
</html>
